<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Product Showcase</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <div class="product">
    <img src="https://via.placeholder.com/400x600" alt="Product">

    <div class="hs" id="h1"><div class="dot"></div></div>
    <div class="tip" id="t1">
      <div class="tip-title">Premium Build</div>
      <div class="tip-sub">High-quality materials for durability and style.</div>
    </div>

    <div class="hs" id="h2"><div class="dot"></div></div>
    <div class="tip" id="t2">
      <div class="tip-title">Smart Features</div>
      <div class="tip-sub">Integrated modern technology.</div>
    </div>

    <div class="hs" id="h3"><div class="dot"></div></div>
    <div class="tip" id="t3">
      <div class="tip-title">Ergonomic Design</div>
      <div class="tip-sub">Comfort-focused design.</div>
    </div>

    <div class="hs" id="h4"><div class="dot"></div></div>
    <div class="tip" id="t4">
      <div class="tip-title">Long Battery</div>
      <div class="tip-sub">Extended usage time.</div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
